services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://seo_geo:seo_geo@postgres:5432/seo_geo
      REDIS_URL: redis://redis:6379
    ports: ["3000:3000"]
    depends_on: [postgres, redis]
  worker:
    build: .
    command: ["npx", "tsx", "worker/index.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://seo_geo:seo_geo@postgres:5432/seo_geo
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]
  postgres:
    image: postgres:17-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: seo_geo
      POSTGRES_USER: seo_geo
      POSTGRES_PASSWORD: seo_geo
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
volumes:
  postgres_data:
  redis_data:
